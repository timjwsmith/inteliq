server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # index.html and sw.js — never cache so browsers always get fresh bundle references
    location ~* ^/(index\.html|sw\.js)$ {
        try_files $uri /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Hashed static assets — cache forever (filename changes on each build)
    location ~* \.(js|css|png|jpg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # React app — all routes fall back to index.html (SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the Express server
    location /api/ {
        proxy_pass http://inteliq-server:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
