services:
  # Caddy reverse proxy — automatic HTTPS via Let's Encrypt
  caddy:
    build:
      context: .
      dockerfile: Dockerfile.caddy
    container_name: inteliq-caddy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_started
    restart: unless-stopped

  # Express API proxy (keeps Anthropic API key server-side)
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: inteliq-server
    env_file: .env
    volumes:
      - inteliq-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # React frontend served via nginx
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: inteliq-app
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

volumes:
  inteliq-data:
  caddy_data:
  caddy_config:
