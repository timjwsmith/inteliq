version: "3.9"

services:
  # Express API proxy (keeps Anthropic API key server-side)
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: inteliq-server
    env_file: .env
    ports:
      - "3001:3001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # React frontend served via nginx
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: inteliq-app
    ports:
      - "3000:80"
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

volumes: {}
